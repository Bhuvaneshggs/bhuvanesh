<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>403 — Access Forbidden</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#02153f;
      --surface:#051d54;
      --card:#071f5c;
      --border:rgba(255,255,255,0.08);
      --text:#e8edf8;
      --muted:#8fa3c8;
      --accent:#4b8fff;
      --accent2:#00d4ff;
      --glow:rgba(75,143,255,0.18);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:'DM Sans',sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    /* GRID */
    body::before{
      content:'';
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg,var(--border) 1px, transparent 1px);
      background-size:60px 60px;
      z-index:0;
    }

    /* BLOBS */
    .blob{
      position:absolute;
      border-radius:50%;
      filter:blur(90px);
      opacity:.22;
      animation:float 8s ease-in-out infinite alternate;
    }

    .blob1{
      width:500px;
      height:500px;
      background:var(--accent);
      top:-150px;
      right:-120px;
    }

    .blob2{
      width:420px;
      height:420px;
      background:var(--accent2);
      bottom:-140px;
      left:-100px;
      animation-delay:3s;
    }

    @keyframes float{
      from{
        transform:translateY(0) scale(1);
      }
      to{
        transform:translateY(35px) scale(1.08);
      }
    }

    .container{
      position:relative;
      z-index:2;
      width:min(92%,780px);
      text-align:center;
      background:rgba(7,31,92,0.55);
      backdrop-filter:blur(18px);
      border:1px solid var(--border);
      border-radius:32px;
      padding:4rem 2rem;
      box-shadow:
        0 10px 40px rgba(0,0,0,.25),
        0 0 50px var(--glow);
    }

    .status{
      display:inline-flex;
      align-items:center;
      gap:.6rem;
      padding:.45rem 1rem;
      border-radius:999px;
      border:1px solid var(--accent);
      background:var(--glow);
      color:var(--accent2);
      font-size:.8rem;
      font-weight:600;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:1.5rem;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#ef4444;
      box-shadow:0 0 12px #ef4444;
      animation:pulse 2s infinite;
    }

    @keyframes pulse{
      0%,100%{
        transform:scale(1);
        opacity:1;
      }
      50%{
        transform:scale(1.4);
        opacity:.6;
      }
    }

    h1{
      font-family:'Syne',sans-serif;
      font-size:clamp(5rem,18vw,10rem);
      font-weight:800;
      line-height:1;
      letter-spacing:-0.05em;
      margin-bottom:1rem;

      background:linear-gradient(
        135deg,
        #ffffff 0%,
        var(--accent) 35%,
        var(--accent2) 70%,
        #a78bfa 100%
      );

      background-size:300% 300%;

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      animation:gradientMove 6s ease infinite;
      filter:drop-shadow(0 0 30px rgba(75,143,255,.25));
    }

    @keyframes gradientMove{
      0%{
        background-position:0% 50%;
      }
      50%{
        background-position:100% 50%;
      }
      100%{
        background-position:0% 50%;
      }
    }

    h2{
      font-family:'Space Grotesk',sans-serif;
      font-size:clamp(1.6rem,4vw,2.4rem);
      margin-bottom:1rem;
      letter-spacing:-0.03em;
    }

    p{
      color:var(--muted);
      font-size:1rem;
      line-height:1.8;
      max-width:560px;
      margin:0 auto 2rem;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:1rem;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      gap:.65rem;
      padding:.85rem 1.7rem;
      border-radius:999px;
      text-decoration:none;
      font-weight:600;
      font-size:.92rem;
      transition:.3s ease;
    }

    .btn-primary{
      background:linear-gradient(
        135deg,
        var(--accent),
        var(--accent2)
      );
      color:#fff;
      box-shadow:0 8px 30px var(--glow);
    }

    .btn-primary:hover{
      transform:translateY(-3px);
      box-shadow:0 12px 35px var(--glow);
    }

    .btn-outline{
      border:1px solid var(--accent);
      color:var(--accent);
      background:transparent;
    }

    .btn-outline:hover{
      background:var(--glow);
      transform:translateY(-3px);
    }

    .lock{
      width:80px;
      height:80px;
      margin:0 auto 1.5rem;
      opacity:.9;
    }

    .lock svg{
      width:100%;
      height:100%;
      fill:none;
      stroke:var(--accent2);
      stroke-width:1.8;
      filter:drop-shadow(0 0 18px rgba(0,212,255,.4));
    }

    @media(max-width:640px){
      .container{
        padding:3rem 1.4rem;
      }

      p{
        font-size:.95rem;
      }
    }
  </style>
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="container">

    <div class="status">
      <span class="dot"></span>
      Access Restricted
    </div>

    <div class="lock">
      <svg viewBox="0 0 24 24">
        <path d="M7 10V7a5 5 0 0110 0v3"/>
        <rect x="5" y="10" width="14" height="10" rx="2"/>
        <path d="M12 14v2"/>
      </svg>
    </div>

    <h1>403</h1>

    <h2>Access Forbidden</h2>

    <p>
      You don’t have permission to access this page or resource.
      The server understood your request, but access has been denied.
    </p>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        Go Home
      </a>

      <a href="javascript:history.back()" class="btn btn-outline">
        Go Back
      </a>
    </div>

  </div>

</body>
</html>
